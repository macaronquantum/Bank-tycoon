services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ticood
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  web:
    build: .
    command: sh -c "npm install && npx prisma db push && npm run db:seed && npm run dev"
    ports: ["3000:3000"]
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ticood
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: changeme
      NEXTAUTH_URL: http://localhost:3000
  worker:
    build: .
    command: sh -c "npm install && npm run worker"
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ticood
      REDIS_URL: redis://redis:6379
